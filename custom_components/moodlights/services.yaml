activate_mood:
  name: Activate Mood
  description: Activate a mood, saving current light states first. Optionally auto-revert after a duration.
  fields:
    mood_name:
      name: Mood Name
      description: The name of the mood to activate (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:
    preset_name:
      name: Snapshot Label
      description: Optional label for the light state snapshot saved before activation.
      required: false
      example: Before Movie Night
      selector:
        text:
    duration:
      name: Auto-Revert After
      description: Automatically revert after this many minutes. Overrides the mood's Revert After setting for this activation. Leave empty to use the mood's configured duration (if Revert Timer is enabled).
      required: false
      example: 60
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min

restore_previous:
  name: Restore Previous
  description: Restore the lights for a mood to their last saved state. Also cancels any active auto-revert timer.
  fields:
    mood_name:
      name: Mood Name
      description: The name of the mood to restore (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:

save_state:
  name: Save State
  description: Manually snapshot the current state of a mood's lights.
  fields:
    mood_name:
      name: Mood Name
      description: The name of the mood whose lights to snapshot (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:
    preset_name:
      name: Snapshot Label
      description: Optional label for this snapshot.
      required: false
      example: Daytime
      selector:
        text:

cancel_auto_revert:
  name: Cancel Auto-Revert
  description: Cancel the active auto-revert timer for a mood without restoring. The mood stays in its current state.
  fields:
    mood_name:
      name: Mood Name
      description: The name of the mood whose auto-revert timer to cancel.
      required: true
      example: Movie Night
      selector:
        text:
