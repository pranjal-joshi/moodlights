activate_mood:
  name: Activate Mood
  description: Activate a mood, saving current light states first.
  fields:
    config_entry_id:
      name: MoodLights Instance
      description: Select the MoodLights integration instance to use.
      required: true
      selector:
        config_entry:
          integration: moodlights
    mood_name:
      name: Mood Name
      description: The name of the mood to activate (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:
    preset_name:
      name: Snapshot Label
      description: Optional label for the light state snapshot saved before activation.
      required: false
      example: Before Movie Night
      selector:
        text:

restore_previous:
  name: Restore Previous
  description: Restore the lights for a mood to their last saved state.
  fields:
    config_entry_id:
      name: MoodLights Instance
      description: Select the MoodLights integration instance to use.
      required: true
      selector:
        config_entry:
          integration: moodlights
    mood_name:
      name: Mood Name
      description: The name of the mood to restore (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:

save_state:
  name: Save State
  description: Manually snapshot the current state of a mood's lights.
  fields:
    config_entry_id:
      name: MoodLights Instance
      description: Select the MoodLights integration instance to use.
      required: true
      selector:
        config_entry:
          integration: moodlights
    mood_name:
      name: Mood Name
      description: The name of the mood whose lights to snapshot (exactly as entered during setup).
      required: true
      example: Movie Night
      selector:
        text:
    preset_name:
      name: Snapshot Label
      description: Optional label for this snapshot.
      required: false
      example: Daytime
      selector:
        text:
